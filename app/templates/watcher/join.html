{% extends "base.html" %}
{% block title %}家族を追加 — MiMo{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/watcher.css') }}">
{% endblock %}

{% block content %}
<header class="w-header">
  <div class="w-header__logo"><img src="/static/icons/icon-192.png" alt="MiMo" class="header-logo-img"></div>
  <div class="w-header__actions">
    <a href="{{ url_for('watcher.notifications') }}" class="w-header__icon" aria-label="通知" title="通知" style="text-decoration:none;">🔔</a>
    <a href="{{ url_for('watcher.settings') }}" class="w-header__icon" aria-label="アカウント設定" title="アカウント設定" style="text-decoration:none;">👤</a>
    <a href="{{ url_for('watcher.dashboard') }}" class="w-header__icon" aria-label="ダッシュボードへ戻る" title="ダッシュボードへ戻る" style="text-decoration:none;font-size:14px;">← 一覧</a>
  </div>
</header>

<main class="w-container">
  <h1 class="w-page-title">家族を追加</h1>
  <p class="w-page-subtitle">親から受け取った招待リンクまたはコードを入力してください。</p>

  <form method="POST" action="{{ url_for('watcher.join') }}" class="w-join-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="w-join-field">
      <label class="w-join-label" for="token">招待リンク / コード</label>
      <input type="text" id="token" name="token"
             class="w-join-input"
             placeholder="https://... または トークンコードを貼り付け"
             autocomplete="off" required>
    </div>

    <button type="submit" class="w-join-btn">登録する</button>
  </form>
</main>
{% endblock %}
