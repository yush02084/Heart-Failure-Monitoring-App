<!DOCTYPE html>
<html lang="ja">
<head>

  <title>ページが見つかりません — 心不全見守り</title>
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; background: #f3faff; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .box { text-align: center; padding: 40px 24px; max-width: 400px; }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 700; color: #071e27; margin-bottom: 8px; }
    p { font-size: 16px; color: #3e494a; margin-bottom: 32px; line-height: 1.6; }
    a { display: inline-block; background: #006269; color: white; text-decoration: none; padding: 14px 32px; border-radius: 1.5rem; font-size: 16px; font-weight: 700; }
    a:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🔍</div>
    <h1>ページが見つかりません</h1>
