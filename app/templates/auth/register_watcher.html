<!DOCTYPE html>
<!--
  register_watcher.html — トークン経由 子（見守り担当）登録画面
  Flask統合時:
    - {% extends "base.html" %} に置き換え
    - CSS linkを {{ url_for('static', filename='css/watcher.css') }} に変更
    - action="{{ url_for('auth.register_watcher', token=token) }}" に変更
    - モックデータを {{ }} 変数に差し替え（各コメント参照）
-->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>見守り登録 — 心不全見守り</title>
  <link rel="stylesheet" href="../../static/css/watcher.css">
  <style>
    /* 登録画面専用スタイル */
    .reg-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 24px 60px;
      background: var(--bg);
    }

    .reg-card {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--outline-variant);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      box-shadow: 0 4px 20px rgba(0, 98, 105, 0.08);
    }

    /* ロゴ */
    .reg-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 28px;
    }

    /* 招待バナー */
    .reg-invite-banner {
      background: var(--surface-low);
      border: 1px solid var(--outline-variant);
      border-left: 4px solid var(--primary);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 28px;
      font-size: 14px;
      color: var(--on-surface-muted);
      line-height: 1.6;
    }
    .reg-invite-banner strong {
      color: var(--on-surface);
      font-size: 16px;
    }

    /* タイトル */
    .reg-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--on-surface);
    }
    .reg-subtitle {
      font-size: 14px;
      color: var(--on-surface-muted);
      margin-bottom: 28px;
    }

    /* フォームフィールド */
    .reg-field {
      margin-bottom: 20px;
    }
    .reg-field label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--on-surface);
      margin-bottom: 6px;
    }
    .reg-field label .required {
      color: var(--danger);
      margin-left: 2px;
    }
    .reg-field label .optional {
      font-size: 12px;
      font-weight: 400;
      color: var(--on-surface-muted);
      margin-left: 4px;
    }
    .reg-field input {
      width: 100%;
      min-height: 52px;
      padding: 0 14px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 16px;
      color: var(--on-surface);
      background: var(--surface);
      border: 1.5px solid var(--outline-variant);
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      appearance: none;
    }
    .reg-field input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0, 98, 105, 0.12);
    }
    .reg-field input::placeholder {
      color: var(--outline);
    }

    /* ヒントテキスト */
    .reg-field__hint {
      font-size: 12px;
      color: var(--on-surface-muted);
      margin-top: 5px;
    }

    /* エラー表示（Flask統合後: form.xxx.errors で表示） */
    .reg-field__error {
      font-size: 12px;
      color: var(--danger);
      margin-top: 5px;
      display: none; /* スタンドアロン時は非表示 */
    }

    /* セクション区切り */
    .reg-divider {
      border: none;
      border-top: 1px solid var(--outline-variant);
      margin: 24px 0;
    }
    .reg-section-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--on-surface-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* 送信ボタン */
    .reg-submit {
      width: 100%;
      min-height: 56px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-xl);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s, transform 0.1s;
    }
    .reg-submit:hover  { opacity: 0.92; }
    .reg-submit:active { opacity: 0.85; transform: scale(0.99); }

    /* ログインリンク */
    .reg-login-link {
      text-align: center;
      font-size: 14px;
      color: var(--on-surface-muted);
      margin-top: 20px;
    }
    .reg-login-link a {
      color: var(--primary);
      font-weight: 600;
    }

    /* PC幅調整 */
    @media (min-width: 768px) {
      .reg-page { padding-top: 60px; }
      .reg-card { padding: 40px 36px; }
    }
  </style>
</head>
<body>

<div class="reg-page">
  <div class="reg-card">

    <!-- ロゴ -->
    <div class="reg-logo">🫀 心不全見守り</div>

    <!-- 招待バナー -->
    <!-- Flask: {{ parent_name }} -->
    <div class="reg-invite-banner">
      <strong>山田太郎</strong> さんから<br>
      見守りへの招待が届いています。<br>
      アカウントを作成して見守りを開始しましょう。
    </div>

    <h1 class="reg-title">アカウント登録</h1>
    <p class="reg-subtitle">見守り担当者として登録します</p>

    <!-- ==============================
         フォーム
         Flask: action="{{ url_for('auth.register_watcher', token=token) }}"
         ============================== -->
    <form method="POST" action="#">

      <!-- CSRF token（Flask: {{ form.csrf_token }}） -->
      <input type="hidden" name="csrf_token" value="mock-csrf-token">
      <!-- 招待トークン（Flask: {{ token }}） -->
      <input type="hidden" name="token" value="mock-invite-token-abc123">

      <!-- ========== 基本情報 ========== -->
      <div class="reg-section-label">基本情報</div>

      <!-- 氏名 -->
      <div class="reg-field">
        <label for="name">お名前 <span class="required">*</span></label>
        <!-- Flask: value="{{ form.name.data or '' }}" -->
        <input type="text" id="name" name="name" placeholder="例：山田一郎" required>
        <!-- Flask: {% if form.name.errors %}<div class="reg-field__error">...</div>{% endif %} -->
        <div class="reg-field__error" id="err-name"></div>
      </div>

      <!-- メールアドレス -->
      <div class="reg-field">
        <label for="email">メールアドレス <span class="required">*</span></label>
        <input type="email" id="email" name="email" placeholder="例：ichiro@example.com" required>
        <div class="reg-field__hint">通知メールの送信先になります</div>
        <div class="reg-field__error" id="err-email"></div>
      </div>

      <!-- 電話番号 -->
      <div class="reg-field">
        <label for="phone_number">電話番号 <span class="optional">（任意）</span></label>
        <input type="tel" id="phone_number" name="phone_number" placeholder="例：090-1234-5678">
        <div class="reg-field__error" id="err-phone"></div>
      </div>

      <hr class="reg-divider">

      <!-- ========== ログイン情報 ========== -->
      <div class="reg-section-label">ログイン情報</div>

      <!-- ログインID -->
      <div class="reg-field">
        <label for="login_id">ログインID <span class="required">*</span></label>
        <input type="text" id="login_id" name="login_id"
               placeholder="例：ichiro2024"
               autocomplete="username" required>
        <div class="reg-field__hint">4〜20文字（半角英数字）</div>
        <div class="reg-field__error" id="err-login-id"></div>
      </div>

      <!-- パスワード -->
      <div class="reg-field">
        <label for="password">パスワード <span class="required">*</span></label>
        <input type="password" id="password" name="password"
               placeholder="8文字以上"
               autocomplete="new-password" required>
        <div class="reg-field__hint">8文字以上で設定してください</div>
        <div class="reg-field__error" id="err-password"></div>
      </div>

      <!-- パスワード確認 -->
      <div class="reg-field">
        <label for="password_confirm">パスワード（確認） <span class="required">*</span></label>
        <input type="password" id="password_confirm" name="password_confirm"
               placeholder="もう一度入力"
               autocomplete="new-password" required>
        <div class="reg-field__error" id="err-password-confirm"></div>
      </div>

      <!-- 送信ボタン -->
      <button type="submit" class="reg-submit">
        登録して見守りを開始する
      </button>

    </form>

    <!-- ログインリンク -->
    <p class="reg-login-link">
      すでにアカウントをお持ちの方は
      <!-- Flask: href="{{ url_for('auth.login') }}" -->
      <a href="login.html">ログイン</a>
    </p>

  </div><!-- /.reg-card -->
</div><!-- /.reg-page -->

</body>
</html>
